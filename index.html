<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generatore Cringe Santi</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: 'Arial Black', Arial, sans-serif;
    background: radial-gradient(circle at center, #1a0000, #000000 80%);
    margin: 0;
    padding: 15px;
    color: #fff;
}

.box {
    background: linear-gradient(145deg, #0a0a0a, #1a1a1a);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 
        0 0 20px rgba(255, 0, 0, 0.6),
        inset 0 0 15px rgba(255, 0, 0, 0.3);
    max-width: 600px;
    margin: auto;
    text-align: center;
    border: 1px solid rgba(255, 0, 0, 0.4);
}

button {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(145deg, #800000, #ff0000);
    color: white;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;

    box-shadow: 
        0 0 10px rgba(255, 0, 0, 0.7),
        inset 0 0 5px rgba(0,0,0,0.8);

    transition: all 0.2s ease;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 
        0 0 20px rgba(255, 0, 0, 1),
        0 0 40px rgba(255, 0, 0, 0.5);
}

button:active {
    transform: scale(0.97);
    box-shadow: 
        inset 0 0 10px rgba(0,0,0,1),
        0 0 5px rgba(255,0,0,0.5);
}

#copyBtn {
    background: linear-gradient(145deg, #003300, #00cc00);
    box-shadow: 
        0 0 10px rgba(0, 255, 0, 0.6),
        inset 0 0 5px rgba(0,0,0,0.8);
}

#copyBtn:hover {
    box-shadow: 
        0 0 20px rgba(0, 255, 0, 1),
        0 0 40px rgba(0, 255, 0, 0.5);
}

#output {
    margin-top: 25px;
    font-size: 20px;
    font-weight: bold;
    word-break: break-word;
    color: #ff3b3b;
    text-shadow: 
        0 0 5px rgba(255, 0, 0, 0.8),
        0 0 15px rgba(255, 0, 0, 0.5);
}
</style>
</head>

    <div id="output"></div>

    try {
        document.getElementById("sound").play();

    if (navigator.vibrate) navigator.vibrate(50);
}

function copia() {
    const testo = document.getElementById("output").innerText;
    if (!testo) return;

    navigator.clipboard?.writeText(testo);
