<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generatore Cringe Santi</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #8ec5fc, #e0c3fc);
    margin: 0;
    padding: 15px;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    max-width: 600px;
    margin: auto;
    text-align: center;
}

button {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #ff6b6b;
    color: white;
    cursor: pointer;
    margin-top: 10px;
    -webkit-tap-highlight-color: transparent;
}

#copyBtn {
    background: #4CAF50;
}

#output {
    margin-top: 25px;
    font-size: 18px;
    font-weight: bold;
    word-break: break-word;
}
</style>
</head>

<body>

<div class="box">
    <h1>⚡ TIRA IL TUO SANTO ⚡</h1>
	<p>Se hai poca fantasia per tirare un santo in questo momento, lascia che ci pensi io per te, clicca qui sotto e urla ad alta voce quello che leggi</p>
    <button onclick="genera()">Genera</button>
    <button id="copyBtn" onclick="copia()">Copia</button>
    <div id="output"></div>
</div>

<!-- ✅ FIX AUDIO CORRETTO -->
<audio id="sound" preload="auto" src="https://www.soundjay.com/button/beep-07.wav"></audio>

    "hai la consistenza mentale di un errore di battitura",
    "sei l’ombra di qualcosa che già faceva schifo",

function genera() {
    const santo = santi[Math.floor(Math.random() * santi.length)];
    const frase = frasi[Math.floor(Math.random() * frasi.length)];
    const testo = santo + " " + frase;

    document.getElementById("output").innerText = testo;

    try {
        document.getElementById("sound").play();
    } catch(e) {}

    if (navigator.vibrate) navigator.vibrate(50);
}

function copia() {
    const testo = document.getElementById("output").innerText;
    if (!testo) return;

    navigator.clipboard?.writeText(testo);

    alert("Copiato!");
}
</script>

</body>
</html>
